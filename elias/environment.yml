name: EEG_Elias

channels:
  - conda-forge
  - defaults

dependencies:
  # ── Python ────────────────────────────────────────────────────────────────
  - python=3.11

  # ── Core scientific stack ─────────────────────────────────────────────────
  - numpy
  - scipy
  - pandas
  - matplotlib
  - seaborn
  - scikit-learn

  # ── Deep learning ────────────────────────────────────────────────────────
  - pytorch
  - torchvision
  - torchaudio
  - cudatoolkit=12.1   # Change if your CUDA version is different
  - tensorflow         # Keras is included in TF >= 2.x

  # ── EEG signal processing ────────────────────────────────────────────────
  - mne