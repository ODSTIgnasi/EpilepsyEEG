name: EEG

channels:
  - conda-forge
  - defaults

dependencies:
  # ── Python (more stable for TF + clusters) ────────────────────────────────
  - python=3.10

  # ── Core scientific stack ────────────────────────────────────────────────
  - numpy<2.0
  - scipy
  - pandas
  - matplotlib
  - scikit-learn

  # ── EEG processing ───────────────────────────────────────────────────────
  - mne

  # ── Data handling ────────────────────────────────────────────────────────
  - pyarrow
  - h5py

  # ── Utilities ────────────────────────────────────────────────────────────
  - tqdm
  - seaborn
  - joblib

  # 🔑 Fix for your GLIBCXX error
  - libstdcxx-ng

  # ── Pip packages ─────────────────────────────────────────────────────────
  - pip
  - pip:
      - tensorflow>=2.15
      - keras
      - tensorboard
      - tensorflow-datasets
      - fastparquet